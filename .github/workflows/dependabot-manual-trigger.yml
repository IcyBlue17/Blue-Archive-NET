name: Manually Trigger Dependabot

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trigger:
    name: Trigger Dependabot check
    runs-on: ubuntu-latest

    steps:
      - name: Require the default branch
        env:
          CURRENT_BRANCH: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ "$CURRENT_BRANCH" != "$DEFAULT_BRANCH" ]; then
            echo "Run this workflow from the default branch: $DEFAULT_BRANCH"
            exit 1
          fi

      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update Dependabot trigger marker
        env:
          RUN_MARKER: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          stamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')-${RUN_MARKER}"
          sed -i "s/^# manual-trigger:.*$/# manual-trigger: ${stamp}/" .github/dependabot.yml

      - name: Commit trigger change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/dependabot.yml
          git commit -m "chore: trigger dependabot check"

      - name: Push trigger change
        run: git push origin HEAD:${{ github.event.repository.default_branch }}
